<!DOCTYPE html>
<html>
<head>
    <title>Quotes Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 600px;
            height: 700px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            background: #5b6cff;
            color: white;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-message {
            background: #5b6cff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: #eef1ff;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .quick-buttons {
            display: flex;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            border-top: 1px solid #eee;
        }

        .quick-buttons button {
            background: #eef1ff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .quick-buttons button:hover {
            background: #5b6cff;
            color: white;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .chat-input button {
            background: #5b6cff;
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #3f4fe0;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        ✨ Quotes Recommendation Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">
            👋 Hi! I can give you motivational, love, success, or funny quotes.
        </div>
    </div>

    <div class="quick-buttons">
        <button onclick="sendQuick('motivate me')">Motivation</button>
        <button onclick="sendQuick('love quote')">Love</button>
        <button onclick="sendQuick('success quote')">Success</button>
        <button onclick="sendQuick('tell me something funny')">Humor</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." onkeydown="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function appendMessage(text, className) {
        const chatBox = document.getElementById("chatBox");
        const msg = document.createElement("div");
        msg.classList.add("message", className);
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        if (!message) return;

        appendMessage(message, "user-message");

        fetch("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.json())
        .then(data => {
            appendMessage(data.reply, "bot-message");
        });

        input.value = "";
    }

    function sendQuick(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
    }

    function handleKey(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>

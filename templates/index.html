<!DOCTYPE html>
<html>
<head>
    <title>QuoteBot AI - Daily Wisdom</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            /* Beautiful gradient background matching your design */
            background: linear-gradient(135deg, #7480fa 0%, #9568e6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LANDING PAGE STYLES --- */
        .landing-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            max-width: 500px;
            transition: opacity 0.5s ease;
        }

        .landing-container h1 {
            font-size: 38px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .landing-container p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.95);
        }

        .start-btn {
            background: white;
            color: #7480fa;
            border: none;
            padding: 16px 40px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .tags {
            font-size: 13px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.9;
        }

        /* --- CHAT BOT STYLES --- */
        .chat-container {
            display: none; /* Hidden until button is clicked */
            width: 600px;
            height: 700px;
            background: white;
            border-radius: 20px;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .chat-header {
            background: #7480fa; /* Matched to the new theme */
            color: white;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-message {
            background: #7480fa;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: #eef1ff;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .quick-buttons {
            display: flex;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            border-top: 1px solid #eee;
        }

        .quick-buttons button {
            background: #eef1ff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: background 0.2s, color 0.2s;
        }

        .quick-buttons button:hover {
            background: #7480fa;
            color: white;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .chat-input button {
            background: #7480fa;
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input button:hover {
            background: #5b68e0;
        }
    </style>
</head>

<body>

<div class="landing-container" id="landingPage">
    <h1>Daily Inspiration</h1>
    <p>Your personal AI companion for wisdom, motivation, and clarity. Discover the perfect quote for every moment of your life.</p>
    <button class="start-btn" onclick="startChat()">START CHATTING</button>
    <div class="tags">
        <span>✨ Motivation</span>
        <span>💖 Love</span>
        <span>🚀 Success</span>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        ✨ Quotes Recommendation Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">
            👋 Hi! I can give you motivational, love, success, or funny quotes.
        </div>
    </div>

    <div class="quick-buttons">
        <button onclick="sendQuick('motivate me')">Motivation</button>
        <button onclick="sendQuick('love quote')">Love</button>
        <button onclick="sendQuick('success quote')">Success</button>
        <button onclick="sendQuick('tell me something funny')">Humor</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." onkeydown="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // NEW FUNCTION: Switches from Landing Page to Chat Window
    function startChat() {
        document.getElementById('landingPage').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';
    }

    // Existing Chat Functions
    function appendMessage(text, className) {
        const chatBox = document.getElementById("chatBox");
        const msg = document.createElement("div");
        msg.classList.add("message", className);
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        if (!message) return;

        appendMessage(message, "user-message");

        fetch("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.json())
        .then(data => {
            appendMessage(data.reply, "bot-message");
        });

        input.value = "";
    }

    function sendQuick(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
    }

    function handleKey(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
